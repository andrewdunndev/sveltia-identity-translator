<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A git commit object showing two identity fields. The author field is set to the editor's name and email, populated by the translator injecting author_name and author_email into the request body. The committer field is set to the service-account bot, which owns the PAT actually making the API call." style="width:100%;max-width:720px;margin:1.5rem 0;display:block;font-family:var(--font-ui, 'Source Sans Pro', sans-serif)">
  <defs>
    <marker id="c-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="var(--accent, #4a6741)" />
    </marker>
  </defs>

  <rect x="220" y="20" width="280" height="240" rx="3" fill="none" stroke="var(--text, #0a0a0a)" stroke-width="1.5" />
  <text x="360" y="40" text-anchor="middle" font-size="10" font-weight="700" fill="var(--text-2, #404040)">COMMIT a3f9c12</text>

  <line x1="240" y1="55" x2="480" y2="55" stroke="var(--border, #e0e0e0)" stroke-width="1" />

  <text x="240" y="75" font-size="9" font-weight="700" fill="var(--text-muted, #909090)">AUTHOR</text>
  <text x="240" y="93" font-size="11" font-weight="600" fill="var(--text, #0a0a0a)" font-family="monospace">Ms. García</text>
  <text x="240" y="108" font-size="10" fill="var(--text-2, #404040)" font-family="monospace">m.garcia@example.org</text>

  <text x="240" y="138" font-size="9" font-weight="700" fill="var(--text-muted, #909090)">COMMITTER</text>
  <text x="240" y="156" font-size="11" font-weight="600" fill="var(--text, #0a0a0a)" font-family="monospace">cms-bot</text>
  <text x="240" y="171" font-size="10" fill="var(--text-2, #404040)" font-family="monospace">cms-bot@example.org</text>

  <line x1="240" y1="190" x2="480" y2="190" stroke="var(--border, #e0e0e0)" stroke-width="1" />

  <text x="240" y="210" font-size="10" fill="var(--text, #0a0a0a)" font-family="monospace">Update homecoming dates</text>
  <text x="240" y="225" font-size="9" fill="var(--text-muted, #909090)" font-family="monospace">src/content/blog/homecoming-2026.md</text>

  <rect x="20" y="65" width="160" height="60" rx="3" fill="none" stroke="var(--accent, #4a6741)" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="100" y="85" text-anchor="middle" font-size="10" font-weight="600" fill="var(--accent, #4a6741)">Sveltia request body</text>
  <text x="100" y="100" text-anchor="middle" font-size="9" fill="var(--text-2, #404040)">+ author_name</text>
  <text x="100" y="113" text-anchor="middle" font-size="9" fill="var(--text-2, #404040)">+ author_email</text>

  <text x="100" y="138" text-anchor="middle" font-size="9" fill="var(--text-muted, #909090)">injected by translator</text>
  <text x="100" y="150" text-anchor="middle" font-size="9" fill="var(--text-muted, #909090)">from JWT claims</text>

  <line x1="180" y1="93" x2="234" y2="90" stroke="var(--accent, #4a6741)" stroke-width="1.2" marker-end="url(#c-arrow)" />

  <rect x="540" y="140" width="160" height="60" rx="3" fill="none" stroke="var(--accent, #4a6741)" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="620" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="var(--accent, #4a6741)">PAT owner</text>
  <text x="620" y="175" text-anchor="middle" font-size="9" fill="var(--text-2, #404040)">implicit committer</text>
  <text x="620" y="188" text-anchor="middle" font-size="9" fill="var(--text-2, #404040)">on every API call</text>

  <text x="620" y="213" text-anchor="middle" font-size="9" fill="var(--text-muted, #909090)">single service account</text>
  <text x="620" y="225" text-anchor="middle" font-size="9" fill="var(--text-muted, #909090)">never seen by editors</text>

  <line x1="540" y1="160" x2="486" y2="155" stroke="var(--accent, #4a6741)" stroke-width="1.2" marker-end="url(#c-arrow)" />
</svg>