<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sveltia-identity-translator: editors authenticate via Google Workspace; the translator runs a 5-job pipeline (OAuth handshake, JWT mint, REST proxy with allowlist + author injection, GraphQL read-only, synthesized identity); commits land at GitLab with editor as author and bot as committer." style="width:100%;max-width:1200px;display:block;font-family:'Source Sans Pro', system-ui, sans-serif">
  <defs>
    <marker id="h-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#909090"/>
    </marker>
    <marker id="h-arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#4a6741"/>
    </marker>
  </defs>

  <text x="20" y="32" font-size="22" font-weight="700" fill="#4a6741">sveltia-identity-translator</text>
  <text x="20" y="54" font-size="12" fill="#404040">translated-identity proxy for Sveltia CMS. Editors in your IdP; one bot at the git host; commits attribute correctly.</text>

  <text x="100" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#404040">EDITOR</text>
  <text x="540" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#4a6741">TRANSLATOR (Cloudflare Worker)</text>
  <text x="1010" y="100" text-anchor="middle" font-size="10" font-weight="700" fill="#909090">IDENTITY PROVIDER</text>
  <text x="1010" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#909090">GIT HOST</text>

  <rect x="20" y="105" width="160" height="60" rx="3" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="100" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#0a0a0a">Sveltia /admin/</text>
  <text x="100" y="146" text-anchor="middle" font-size="9" fill="#909090">save / read collections</text>

  <rect x="20" y="180" width="160" height="60" rx="3" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="100" y="203" text-anchor="middle" font-size="11" font-weight="600" fill="#0a0a0a">teacher@example.org</text>
  <text x="100" y="221" text-anchor="middle" font-size="9" fill="#909090">no git-host account</text>

  <rect x="240" y="100" width="600" height="290" rx="4" fill="none" stroke="#4a6741" stroke-width="2"/>

  <rect x="260" y="120" width="260" height="42" rx="2" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="270" y="138" font-size="10" font-weight="700" fill="#4a6741">1</text>
  <text x="284" y="138" font-size="11" font-weight="600" fill="#0a0a0a">/oauth/authorize + /callback</text>
  <text x="284" y="153" font-size="10" fill="#404040">verify hd claim, mint 24h JWT</text>

  <rect x="260" y="172" width="260" height="42" rx="2" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="270" y="190" font-size="10" font-weight="700" fill="#4a6741">2</text>
  <text x="284" y="190" font-size="11" font-weight="600" fill="#0a0a0a">JWT mint (HS256)</text>
  <text x="284" y="205" font-size="10" fill="#404040">sub, email, name; 24h expiry</text>

  <rect x="260" y="224" width="260" height="52" rx="2" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="270" y="242" font-size="10" font-weight="700" fill="#4a6741">3</text>
  <text x="284" y="242" font-size="11" font-weight="600" fill="#0a0a0a">/gitlab/* REST proxy</text>
  <text x="284" y="257" font-size="10" fill="#404040">JWT verify, allowlist, PAT swap,</text>
  <text x="284" y="269" font-size="10" fill="#404040">inject author_name + author_email</text>

  <rect x="260" y="286" width="260" height="42" rx="2" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="270" y="304" font-size="10" font-weight="700" fill="#4a6741">4</text>
  <text x="284" y="304" font-size="11" font-weight="600" fill="#0a0a0a">/gitlab/graphql</text>
  <text x="284" y="319" font-size="10" fill="#404040">read-only; mutations rejected</text>

  <rect x="260" y="338" width="260" height="42" rx="2" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="270" y="356" font-size="10" font-weight="700" fill="#4a6741">5</text>
  <text x="284" y="356" font-size="11" font-weight="600" fill="#0a0a0a">synthesized identity</text>
  <text x="284" y="371" font-size="10" fill="#404040">/user, /members/all/0 from JWT</text>

  <rect x="540" y="120" width="280" height="200" rx="2" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="552" y="138" font-size="10" font-weight="700" fill="#909090">editors.yml (versioned in git)</text>
  <text x="552" y="160" font-size="10" fill="#404040" font-family="ui-monospace, 'SF Mono', Menlo, monospace">teacher@example.org:</text>
  <text x="564" y="174" font-size="10" fill="#404040" font-family="ui-monospace, 'SF Mono', Menlo, monospace">your-org/site:</text>
  <text x="576" y="188" font-size="10" fill="#404040" font-family="ui-monospace, 'SF Mono', Menlo, monospace">- src/content/blog/**</text>

  <text x="552" y="212" font-size="10" fill="#404040" font-family="ui-monospace, 'SF Mono', Menlo, monospace">admin@example.org:</text>
  <text x="564" y="226" font-size="10" fill="#404040" font-family="ui-monospace, 'SF Mono', Menlo, monospace">your-org/site:</text>
  <text x="576" y="240" font-size="10" fill="#404040" font-family="ui-monospace, 'SF Mono', Menlo, monospace">- "**"</text>

  <line x1="552" y1="258" x2="808" y2="258" stroke="#e0e0e0" stroke-width="1"/>

  <text x="552" y="276" font-size="10" font-weight="700" fill="#909090">authorize hook</text>
  <text x="552" y="290" font-size="10" fill="#404040">authorize(identity, repo, path) → bool</text>
  <text x="552" y="304" font-size="10" fill="#404040">default-deny, then swap to bot PAT</text>

  <rect x="900" y="110" width="220" height="100" rx="3" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="1010" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#0a0a0a">Google consent</text>
  <text x="1010" y="155" text-anchor="middle" font-size="10" fill="#404040">OAuth 2.0 + OIDC</text>
  <text x="1010" y="175" text-anchor="middle" font-size="10" fill="#909090">hd claim verifies domain</text>
  <text x="1010" y="195" text-anchor="middle" font-size="10" fill="#909090">(checked server-side)</text>

  <rect x="900" y="250" width="220" height="140" rx="3" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="1010" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#0a0a0a">commit @ GitLab</text>
  <line x1="916" y1="282" x2="1104" y2="282" stroke="#e0e0e0" stroke-width="1"/>
  <text x="916" y="300" font-size="9" font-weight="700" fill="#909090">AUTHOR</text>
  <text x="916" y="316" font-size="11" fill="#0a0a0a" font-family="ui-monospace, 'SF Mono', Menlo, monospace">teacher@example.org</text>
  <text x="916" y="338" font-size="9" font-weight="700" fill="#909090">COMMITTER</text>
  <text x="916" y="354" font-size="11" fill="#0a0a0a" font-family="ui-monospace, 'SF Mono', Menlo, monospace">cms-bot</text>
  <line x1="916" y1="365" x2="1104" y2="365" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1010" y="382" text-anchor="middle" font-size="10" fill="#c4763a">attribution preserved</text>

  <line x1="182" y1="135" x2="238" y2="140" stroke="#909090" stroke-width="1.2" marker-end="url(#h-arrow)"/>
  <line x1="182" y1="210" x2="238" y2="247" stroke="#909090" stroke-width="1.2" marker-end="url(#h-arrow)"/>

  <line x1="842" y1="140" x2="898" y2="140" stroke="#909090" stroke-width="1.2" marker-end="url(#h-arrow)"/>
  <line x1="898" y1="160" x2="842" y2="160" stroke="#909090" stroke-width="1.2" marker-end="url(#h-arrow)"/>

  <line x1="842" y1="252" x2="898" y2="290" stroke="#4a6741" stroke-width="1.5" marker-end="url(#h-arrow-accent)"/>

  <line x1="20" y1="408" x2="1180" y2="408" stroke="#e0e0e0" stroke-width="1"/>
  <text x="20" y="423" font-size="10" fill="#909090">~700 LOC TypeScript · Cloudflare Workers free tier · MIT licensed</text>
  <text x="1180" y="423" text-anchor="end" font-size="10" fill="#909090">github.com/andrewdunndev/sveltia-identity-translator</text>
</svg>
